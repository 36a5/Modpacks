name: CI

on:
  push:
    branches: [master, dev, "feature/**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Refresh pack index
        working-directory: pack
        run: packwiz refresh

      - name: Fail if index is stale
        run: git diff --exit-code

      # packwiz indexes every file under pack/ regardless of .gitignore. An indexed
      # file that isn't committed becomes a 404 on GitHub Pages, and packwiz-installer
      # aborts the whole install for every player. This already shipped once.
      - name: Every indexed file must be committed
        run: |
          set -euo pipefail
          # sed, not grep -P: PCRE is unavailable in some locales and grep then matches
          # nothing, so the loop body never runs and the guard passes silently.
          sed -n 's/^file = "\(.*\)"$/\1/p' pack/index.toml > /tmp/indexed.txt
          total=$(wc -l < /tmp/indexed.txt)
          [ "$total" -gt 0 ] || { echo "::error::parsed 0 files from index.toml — the guard is broken"; exit 1; }

          missing=0
          while IFS= read -r f; do
            if ! git ls-files --error-unmatch "pack/$f" >/dev/null 2>&1; then
              echo "::error::index.toml references pack/$f, which is not committed — it will 404 for players"
              missing=$((missing+1))
            fi
          done < /tmp/indexed.txt
          echo "checked $total indexed files, $missing missing"
          [ "$missing" -eq 0 ]

      - name: Test CurseForge export
        working-directory: pack
        run: packwiz curseforge export

      - name: Test Modrinth export
        working-directory: pack
        run: packwiz modrinth export
