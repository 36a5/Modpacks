name: Deploy pack to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Publish ONLY the pack folders — never the whole repo. Deploying repo root
      # would put server/, *.ps1 admin scripts and .github/ on the public web too.
      # Add new packs to this list.
      - name: Assemble site from pack folders
        run: |
          set -euo pipefail
          mkdir -p _site
          for p in pack pack-two; do
            cp -r "$p" "_site/$p"
          done

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
